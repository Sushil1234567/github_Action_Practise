name: Call Workflow
on: 
 push: 
   branches: [main]

jobs:
 build:
  uses: ./.github/workflows/reusable-build.yml
  
  with:
    app_name : "my-web-app" 
    environment: "production"

  secrets: 
      docker-token: ${{ secrets.DOCKER_TOKEN }}  

 second_job: 
   runs-on: ubuntu-latest   
   needs:   build
   steps:
     - name: Print Build Version
       run:  | 
        echo "Version: ${{ needs.build.outputs.build_version }}"


      

      
