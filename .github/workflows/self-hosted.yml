name: Self Hosted Runner
on:
  push:
    branches: [main]
      
      
jobs:
  Runner:
    runs-on: self-hosted
    
    steps:
      - name: Prints Hostname
        run: hostname
       
      - name: Prints working directory
        run: pwd
       
      - name: Create a file
        run: echo "Yes, the file exists" > FileCreated.txt


        

      
    
    
  
