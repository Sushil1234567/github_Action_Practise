name: Deploy aftertest
on:
 workflow_run: 
  workflows: ["Run Tests"]
  types: [completed]

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Message on completion
        if:   ${{ github.event.workflow_run.conclusion == 'success' }}
        run:  echo "Success !"

      - name: Message on failure
        if:   ${{ github.event.workflow_run.conclusion != 'success' }}
        run:  echo "::Warning::Failed & skipped !"
              exit 1



