name: Multi-Job
on: 
  push:
     branches: [main]

jobs:
  Build:
     runs-on: ubuntu-latest
     steps:
       - name: Step 1
         run:  echo "Building the App"

  Test:
     runs-on: ubuntu-latest
     needs: Build
     steps:
       - name: Step 2
         run:  echo "Running Tests"

  Deploy:
     runs-on: ubuntu-latest
     needs: Test
     steps:
       - name: Step 3
         run: echo "Deploying"

         
