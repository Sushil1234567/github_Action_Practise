name: Environment Variables
on:
  push:
     branches: [main]

env:
  APP_NAME: myapp

jobs:
  Scope:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: staging
      
    steps:
      - name: Prints the variable at workflow , job and step level
        env:   
          VERSION: 1.0.0
        run: |
         echo "App is: $APP_NAME "
         echo "Environment is: $ENVIRONMENT "
         echo "Version is: $VERSION "
           
      
           
    
  
     
